<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Love Running club for runners in Dublin, Ireland. urban running, trail running, trail running clubs. Dublin docklands and Phoenix Park.">
    <meta name="keywords" content="love running, run, running club, runners, Dublin, Ireland, Dublin docklands, Phoenix Park, trail running, trail running clubs">
    <!-- title -->
    <title>Love running</title>
    <!-- favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
    <!-- stylesheet -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!-- header -->
    <header>
        <a href="index.html">
            <h1 id="logo">Love Running</h1>
        </a>
        <input type="checkbox" id="nav-toggle" name="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label"><i class="fa-solid fa-bars"></i></label>
        <nav>
            <ul id="menu">
                <li>
                    <a href="index.html">Home</a>
                </li>
                <li>
                    <a href="gallery.html">Gallery</a>
                </li>
                <li>
                    <a href="signup.html" class="active">Sign Up</a>
                </li>
            </ul>
        </nav>
    </header>
    <!-- main -->
    <main>
        <section id="signup">
            <form id="signup-form" action="https://formdump.codeinstitute.net/" method="POST">
                <h2> <i class="fa-solid fa-heartbeat"></i> Let's get you signed up!</h2>
                <label for="fname">First Name</label>
                <input type="text" id="fname" name="first_name" placeholder="First Name" required>
                <label for="lname">Last Name</label>
                <input type="text" id="lname" name="last_name" placeholder="Last Name" required>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Email Address" required>


                <div id="radio-buttons">
                    <div>
                        <label for="road">Road</label>
                        <input type="radio" id="road" value="road" name="running_preference" checked />
                    </div>
                    <div>
                        <label for="trail">Trail</label>
                        <input type="radio" id="trail" value="trail" name="running_preference" />
                    </div>
                    <div>
                        <label for="both">Both</label>
                        <input type="radio" id="both" value="both" name="running_preference" />
                    </div>
                </div>

                <button type="submit" class="join-button">Let's Run!</button>
            </form>
        </section>
    </main>
    <!-- footer -->
    <footer>
        <ul id="social-networks">
            <li>
                <a href="https://facebook.com" target="_blank" rel="noopener" aria-label="Visit our Facebook page (opens in a new tab)"><i class="fab fa-facebook"></i></a>
            </li>
            <li>
                <a href="https://twitter.com" target="_blank" rel="noopener" aria-label="Visit our Twitter page (opens in a new tab)"><i class="fab fa-twitter-square"></i></a>
            </li>
            <li>
                <a href="https://youtube.com" target="_blank" rel="noopener" aria-label="Visit our YouTube page (opens in a new tab)"><i class="fab fa-youtube-square"></i></a>
            </li>
            <li>
                <a href="https://instagram.com" target="_blank" rel="noopener" aria-label="Visit our Instagram page (opens in a new tab)"><i class="fab fa-instagram"></i></a>
            </li>
        </ul>
    </footer>
    <!-- font awesome -->
    <script src="https://kit.fontawesome.com/c867f07159.js" crossorigin="anonymous"></script>

</body>

</html>
